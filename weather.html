<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Forecast</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: background 1s ease;
    color: white;
  }
  body.sunny { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
  body.cloudy { background: linear-gradient(135deg, #a8c0cc 0%, #6b8fa3 100%); }
  body.rainy  { background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%); }
  body.stormy { background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%); }
  body.snowy  { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); color: #333; }
  body.night  { background: linear-gradient(135deg, #0f0c29 0%, #302b63 0%, #24243e 100%); }

  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  h1 {
    font-family: 'Playfair Display', serif; font-size: 48px;
    text-align: center; margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .subtitle { text-align: center; opacity: 0.7; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 30px;
    background: rgba(255,255,255,0.15); border-radius: 50px;
    padding: 8px; backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .search-bar input {
    flex: 1; background: none; border: none; outline: none;
    color: white; font-family: 'DM Sans',sans-serif; font-size: 16px;
    padding: 8px 16px;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
  .search-bar button {
    background: rgba(255,255,255,0.25); border: none; border-radius: 40px;
    padding: 10px 24px; color: white; font-family: 'DM Sans',sans-serif;
    font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.2s;
    letter-spacing: 1px;
  }
  .search-bar button:hover { background: rgba(255,255,255,0.4); }
  .main-card {
    background: rgba(255,255,255,0.15); border-radius: 24px; padding: 36px;
    backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
    margin-bottom: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .top-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; }
  .city-name { font-size: 28px; font-weight: 600; }
  .city-date { opacity: 0.7; font-size: 14px; margin-top: 4px; }
  .weather-icon { font-size: 80px; line-height: 1; }
  .temp-display { text-align: center; }
  .temp { font-family: 'Playfair Display', serif; font-size: 88px; font-weight: 700; line-height: 1; }
  .temp sup { font-size: 32px; vertical-align: top; margin-top: 12px; }
  .condition { font-size: 18px; opacity: 0.85; text-align: center; margin-top: 4px; font-style: italic; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 30px; }
  .stat { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; text-align: center; }
  .stat-icon { font-size: 22px; }
  .stat-val { font-size: 20px; font-weight: 600; margin-top: 4px; }
  .stat-label { font-size: 11px; opacity: 0.65; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .forecast { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .day-card {
    background: rgba(255,255,255,0.1); border-radius: 16px; padding: 16px 8px;
    text-align: center; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1);
  }
  .day-card:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
  .day-name { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
  .day-icon { font-size: 28px; margin: 8px 0; }
  .day-temp { font-size: 18px; font-weight: 600; }
  .day-lo { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .error { background: rgba(255,100,100,0.2); border-radius: 16px; padding: 20px; text-align: center; opacity: 0.9; margin-bottom: 20px; border: 1px solid rgba(255,100,100,0.3); }
  .hidden { display: none; }
  .loading { text-align: center; padding: 60px; font-size: 18px; opacity: 0.7; }
  .api-note { text-align: center; font-size: 12px; opacity: 0.55; margin-top: 20px; }
  @media(max-width:600px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .forecast{grid-template-columns:repeat(3,1fr)}
    .top-row{justify-content:center;text-align:center}
    .temp{font-size:64px}
    h1{font-size:34px}
  }
</style>
</head>
<body>
<div class="container">
  <h1>☁ Weather</h1>
  <p class="subtitle">Live Forecast · Real-time Data</p>

  <div class="search-bar">
    <input id="city-input" type="text" placeholder="Search city (e.g. Mumbai, London, Tokyo)..." onkeydown="if(event.key==='Enter') fetchWeather()">
    <button onclick="fetchWeather()">Search</button>
  </div>

  <div id="error-msg" class="error hidden"></div>
  <div id="loading" class="loading hidden">⟳ Fetching weather...</div>

  <div id="weather-content" class="hidden">
    <div class="main-card">
      <div class="top-row">
        <div>
          <div class="city-name" id="city-display"></div>
          <div class="city-date" id="date-display"></div>
        </div>
        <div class="weather-icon" id="w-icon"></div>
        <div class="temp-display">
          <div class="temp" id="temp-display"></div>
          <div class="condition" id="condition-display"></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-icon">💧</div><div class="stat-val" id="humidity"></div><div class="stat-label">Humidity</div></div>
        <div class="stat"><div class="stat-icon">🌬</div><div class="stat-val" id="wind"></div><div class="stat-label">Wind</div></div>
        <div class="stat"><div class="stat-icon">👁</div><div class="stat-val" id="visibility"></div><div class="stat-label">Visibility</div></div>
        <div class="stat"><div class="stat-icon">🌡</div><div class="stat-val" id="feelslike"></div><div class="stat-label">Feels Like</div></div>
      </div>
    </div>
    <div class="main-card">
      <div style="font-size:13px;opacity:0.7;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px">5-Day Forecast</div>
      <div class="forecast" id="forecast-row"></div>
    </div>
  </div>

  <p class="api-note">Powered by Open-Meteo · No API key required · Real weather data</p>
</div>

<script>
const weatherIcons = {
  0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️', 45:'🌫', 48:'🌫',
  51:'🌦', 53:'🌦', 55:'🌧', 61:'🌧', 63:'🌧', 65:'🌧',
  71:'🌨', 73:'🌨', 75:'❄️', 80:'🌦', 81:'🌦', 82:'⛈',
  95:'⛈', 96:'⛈', 99:'⛈'
};
const conditions = {
  0:'Clear Sky', 1:'Mainly Clear', 2:'Partly Cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy Fog', 51:'Light Drizzle', 53:'Drizzle', 55:'Heavy Drizzle',
  61:'Light Rain', 63:'Moderate Rain', 65:'Heavy Rain', 71:'Light Snow',
  73:'Moderate Snow', 75:'Heavy Snow', 80:'Rain Showers', 81:'Rain Showers',
  82:'Violent Showers', 95:'Thunderstorm', 96:'Thunderstorm', 99:'Thunderstorm'
};
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function setTheme(code, hour) {
  document.body.className = '';
  if (hour < 6 || hour >= 20) { document.body.classList.add('night'); return; }
  if ([95,96,99].includes(code)) { document.body.classList.add('stormy'); return; }
  if ([61,63,65,80,81,82,51,53,55].includes(code)) { document.body.classList.add('rainy'); return; }
  if ([71,73,75].includes(code)) { document.body.classList.add('snowy'); return; }
  if (code === 0 || code === 1) { document.body.classList.add('sunny'); return; }
  document.body.classList.add('cloudy');
}

async function fetchWeather() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) return;
  show('loading');
  hide('error-msg'); hide('weather-content');

  try {
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
    const geoData = await geoRes.json();
    if (!geoData.results || geoData.results.length === 0) throw new Error('City not found');
    const { latitude, longitude, name, country } = geoData.results[0];

    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,visibility&daily=weather_code,temperature_2m_max,temperature_2m_min&wind_speed_unit=kmh&timezone=auto&forecast_days=5`);
    const w = await wRes.json();
    const c = w.current;
    const d = w.daily;
    const hour = new Date(c.time).getHours();

    document.getElementById('city-display').textContent = `${name}, ${country}`;
    document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    document.getElementById('w-icon').textContent = weatherIcons[c.weather_code] || '🌡';
    document.getElementById('temp-display').innerHTML = `${Math.round(c.temperature_2m)}<sup>°C</sup>`;
    document.getElementById('condition-display').textContent = conditions[c.weather_code] || 'Unknown';
    document.getElementById('humidity').textContent = c.relative_humidity_2m + '%';
    document.getElementById('wind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
    document.getElementById('visibility').textContent = c.visibility >= 1000 ? Math.round(c.visibility/1000)+'km' : c.visibility+'m';
    document.getElementById('feelslike').textContent = Math.round(c.apparent_temperature) + '°C';

    let forecastHtml = '';
    for (let i = 0; i < 5; i++) {
      const dayName = i === 0 ? 'Today' : days[new Date(d.time[i]).getDay()];
      forecastHtml += `<div class="day-card">
        <div class="day-name">${dayName}</div>
        <div class="day-icon">${weatherIcons[d.weather_code[i]] || '🌡'}</div>
        <div class="day-temp">${Math.round(d.temperature_2m_max[i])}°</div>
        <div class="day-lo">${Math.round(d.temperature_2m_min[i])}°</div>
      </div>`;
    }
    document.getElementById('forecast-row').innerHTML = forecastHtml;
    setTheme(c.weather_code, hour);
    show('weather-content'); hide('loading');
  } catch(e) {
    hide('loading');
    const err = document.getElementById('error-msg');
    err.textContent = '⚠ ' + (e.message || 'Could not fetch weather. Try another city.');
    show('error-msg');
  }
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// Load Delhi by default
document.getElementById('city-input').value = 'Delhi';
fetchWeather();
</script>
</body>
</html>
